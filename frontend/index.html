<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI 简历洞察系统 | 专业版</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#FAFAFA] min-h-screen font-sans text-zinc-900 selection:bg-zinc-200">

  <header class="bg-white/80 backdrop-blur-md border-b border-zinc-200/80 sticky top-0 z-10">
    <div class="max-w-4xl mx-auto px-6 py-5 flex items-baseline justify-between">
      <h1 class="text-[1.15rem] font-semibold tracking-tight text-zinc-900">Resume Insights</h1>
      <p class="text-zinc-400 text-xs font-medium tracking-widest uppercase">Intelligent Parsing</p>
    </div>
  </header>

  <main class="max-w-4xl mx-auto px-6 py-12 space-y-12">

    <section class="bg-white rounded-xl shadow-sm border border-zinc-200/60 p-8 sm:p-10 transition-all">
      <div class="mb-8 flex items-center justify-between">
        <h2 class="text-base font-medium text-zinc-800 flex items-center gap-3">
          <span class="bg-zinc-100 text-zinc-500 px-2 py-0.5 rounded text-xs font-semibold tracking-wide">01</span>
          档案解析
        </h2>
      </div>

      <label id="dropZone" class="group block w-full border border-dashed border-zinc-300 rounded-lg p-12 text-center cursor-pointer hover:bg-zinc-50 hover:border-zinc-400 transition-all duration-300 mb-8">
        <div class="flex flex-col items-center justify-center gap-3">
          <svg class="w-7 h-7 text-zinc-400 group-hover:text-zinc-600 transition-colors duration-300" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12"></path>
          </svg>
          <div class="space-y-1">
            <p class="text-zinc-700 font-medium text-sm" id="dropLabel">上传 PDF 格式简历</p>
            <p class="text-xs text-zinc-400">点击此处或将文件拖拽至此区域</p>
          </div>
        </div>
        <input id="resumeFile" type="file" accept=".pdf" class="hidden" onchange="onFileSelected(this)" />
      </label>

      <button onclick="analyzeResume()" class="w-full bg-zinc-900 hover:bg-zinc-800 text-white text-sm font-medium py-3.5 rounded-lg transition-colors shadow-sm ring-1 ring-inset ring-zinc-900/10">
        提取简历数据
      </button>

      <div id="parseResult" class="hidden mt-10 pt-8 border-t border-zinc-100">
        <div id="parseLoading" class="hidden flex justify-center items-center py-8 text-zinc-500 text-sm gap-3">
          <svg class="animate-spin h-4 w-4 text-zinc-400" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>
          正在深度解析文档...
        </div>
        <div id="parseError" class="hidden bg-red-50/50 text-red-600 border border-red-100 rounded-lg p-4 text-sm"></div>
        
        <div id="extractedCards" class="hidden space-y-8">
          <div id="basicInfoGrid" class="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-4 gap-y-6 gap-x-4"></div>
          
          <div id="skillsSection" class="hidden space-y-3">
            <p class="text-[0.65rem] text-zinc-400 font-semibold uppercase tracking-widest">专业技能 / Skills</p>
            <div id="skillsContainer" class="flex flex-wrap gap-2"></div>
          </div>

          <div id="projectsSection" class="hidden space-y-3">
            <p class="text-[0.65rem] text-zinc-400 font-semibold uppercase tracking-widest">项目经历 / Experience</p>
            <ul id="projectsContainer" class="list-none space-y-3"></ul>
          </div>
        </div>
      </div>
    </section>

    <section class="bg-white rounded-xl shadow-sm border border-zinc-200/60 p-8 sm:p-10 transition-all">
      <div class="mb-8 flex items-center justify-between">
        <h2 class="text-base font-medium text-zinc-800 flex items-center gap-3">
          <span class="bg-zinc-100 text-zinc-500 px-2 py-0.5 rounded text-xs font-semibold tracking-wide">02</span>
          匹配度评估
        </h2>
      </div>

      <div class="mb-8">
        <textarea id="jobDescription" rows="6"
                  class="w-full bg-zinc-50/50 border border-zinc-200 rounded-lg p-5 text-sm text-zinc-800 placeholder:text-zinc-400 focus:outline-none focus:ring-1 focus:ring-zinc-400 focus:bg-white resize-none transition-all"
                  placeholder="输入或粘贴目标岗位的 JD (Job Description) 内容..."></textarea>
      </div>

      <button onclick="matchResume()" class="w-full bg-zinc-900 hover:bg-zinc-800 text-white text-sm font-medium py-3.5 rounded-lg transition-colors shadow-sm ring-1 ring-inset ring-zinc-900/10">
        执行双向评估
      </button>

      <div id="scoreResult" class="hidden mt-10 pt-8 border-t border-zinc-100">
        <div id="scoreLoading" class="hidden flex justify-center items-center py-8 text-zinc-500 text-sm gap-3">
          <svg class="animate-spin h-4 w-4 text-zinc-400" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>
          AI 正在进行逻辑比对...
        </div>
        <div id="scoreError" class="hidden bg-red-50/50 text-red-600 border border-red-100 rounded-lg p-4 text-sm"></div>
        <div id="scoreCards" class="hidden space-y-8"></div>
      </div>
    </section>

  </main>

  <script>
    const API_BASE = 'https://resume-assessor-jjvpvorajq.cn-hangzhou.fcapp.run';
    let currentFileHash = null;

    function onFileSelected(input) {
      const label = document.getElementById('dropLabel');
      if (input.files[0]) {
        label.textContent = input.files[0].name;
        label.classList.add('text-zinc-900');
        label.classList.remove('text-zinc-700');
      } else {
        label.textContent = '上传 PDF 格式简历';
        label.classList.remove('text-zinc-900');
        label.classList.add('text-zinc-700');
      }
    }

    const dropZone = document.getElementById('dropZone');
    dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('bg-zinc-50', 'border-zinc-400'); });
    dropZone.addEventListener('dragleave', () => dropZone.classList.remove('bg-zinc-50', 'border-zinc-400'));
    dropZone.addEventListener('drop', e => {
      e.preventDefault();
      dropZone.classList.remove('bg-zinc-50', 'border-zinc-400');
      const file = e.dataTransfer.files[0];
      if (file && file.name.toLowerCase().endsWith('.pdf')) {
        const input = document.getElementById('resumeFile');
        const dt = new DataTransfer();
        dt.items.add(file);
        input.files = dt.files;
        onFileSelected(input);
      }
    });

    async function analyzeResume() {
      const input = document.getElementById('resumeFile');
      const file = input.files[0];
      if (!file) { alert('请先选择一个 PDF 文件'); return; }

      showSection('parseResult');
      showLoading('parseLoading', 'parseError', 'extractedCards');

      try {
        const form = new FormData();
        form.append('file', file);
        const res = await fetch(`${API_BASE}/parse`, { method: 'POST', body: form });
        const data = await res.json();

        if (!res.ok) {
          showError('parseError', data.error || '解析失败，请重试');
          return;
        }

        currentFileHash = data.file_hash;
        renderExtracted(data.extracted, data.cache_hit);
        document.getElementById('parseLoading').classList.add('hidden');
      } catch (err) {
        showError('parseError', '网络错误：' + err.message);
      }
    }

    function renderExtracted(info, cacheHit) {
      document.getElementById('extractedCards').classList.remove('hidden');
      
      // 1. 渲染基础信息
      const basicContainer = document.getElementById('basicInfoGrid');
      basicContainer.innerHTML = '';
      const labels = {
        name: '姓名', phone: '电话', email: '邮箱', address: '地址',
        job_intent: '求职意向', expected_salary: '期望薪资',
        work_years: '工作年限', education: '教育背景',
      };

      for (const [key, label] of Object.entries(labels)) {
        const val = info[key];
        if (!val) continue;
        basicContainer.insertAdjacentHTML('beforeend', `
          <div>
            <p class="text-[0.65rem] text-zinc-400 font-semibold uppercase tracking-widest mb-1">${label}</p>
            <p class="text-sm text-zinc-800 font-medium">${escHtml(String(val))}</p>
          </div>
        `);
      }

      // 2. 渲染技能标签 (新增)
      const skillsSec = document.getElementById('skillsSection');
      const skillsContainer = document.getElementById('skillsContainer');
      if (Array.isArray(info.skills) && info.skills.length > 0) {
        skillsContainer.innerHTML = info.skills.map(s => 
          `<span class="bg-zinc-100/80 border border-zinc-200 text-zinc-700 text-xs px-2.5 py-1 rounded-md font-medium">${escHtml(s)}</span>`
        ).join('');
        skillsSec.classList.remove('hidden');
      } else {
        skillsSec.classList.add('hidden');
      }

      // 3. 渲染项目经历
      const projSec = document.getElementById('projectsSection');
      const projContainer = document.getElementById('projectsContainer');
      if (Array.isArray(info.project_experience) && info.project_experience.length > 0) {
        projContainer.innerHTML = info.project_experience.map(p => 
          `<li class="text-sm text-zinc-700 leading-relaxed bg-zinc-50/50 border border-zinc-100 rounded-lg p-4">${escHtml(p)}</li>`
        ).join('');
        projSec.classList.remove('hidden');
      } else {
        projSec.classList.add('hidden');
      }
    }

    async function matchResume() {
      if (!currentFileHash) { alert('请先完成第一步：解析简历'); return; }
      const jd = document.getElementById('jobDescription').value.trim();
      if (!jd) { alert('请输入岗位描述'); return; }

      showSection('scoreResult');
      showLoading('scoreLoading', 'scoreError', 'scoreCards');

      try {
        const res = await fetch(`${API_BASE}/score`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ file_hash: currentFileHash, job_description: jd }),
        });
        const data = await res.json();

        if (res.status === 404) {
          showError('scoreError', '会话已过期，请重新上传并解析简历');
          currentFileHash = null;
          return;
        }
        if (!res.ok) {
          showError('scoreError', data.error || '评分失败，请重试');
          return;
        }

        renderScore(data);
        document.getElementById('scoreLoading').classList.add('hidden');
      } catch (err) {
        showError('scoreError', '网络错误：' + err.message);
      }
    }

    function renderScore(data) {
      const score = Number(data.score) || 0;
      let theme = { color: 'text-zinc-900', border: 'border-zinc-900', label: '良好匹配' };
      
      if (score >= 80) {
        theme = { color: 'text-emerald-700', border: 'border-emerald-700', label: '高度匹配' };
      } else if (score < 60) {
        theme = { color: 'text-red-700', border: 'border-red-700', label: '建议提升' };
      }

      const matched = (data.matched_keywords || []).map(k =>
        `<span class="bg-emerald-50 text-emerald-700 border border-emerald-200/60 text-[0.7rem] font-medium px-2 py-1 rounded">${escHtml(k)}</span>`
      ).join('');

      const missing = (data.missing_keywords || []).map(k =>
        `<span class="bg-red-50 text-red-700 border border-red-200/60 text-[0.7rem] font-medium px-2 py-1 rounded">${escHtml(k)}</span>`
      ).join('');

      const container = document.getElementById('scoreCards');
      container.innerHTML = `
        <div class="flex flex-col sm:flex-row items-start gap-6">
          <div class="w-20 h-20 rounded-full border-[3px] ${theme.border} flex flex-col items-center justify-center shrink-0">
            <span class="text-2xl font-bold ${theme.color} leading-none mb-0.5">${score}</span>
          </div>
          <div class="flex-1 pt-1">
            <h3 class="text-[0.65rem] font-semibold uppercase tracking-widest text-zinc-400 mb-2">综合评估摘要 / Summary</h3>
            <p class="text-zinc-700 text-sm leading-relaxed">${escHtml(data.summary || '暂无总结')}</p>
          </div>
        </div>

        <div class="grid grid-cols-1 sm:grid-cols-2 gap-8 mt-4 border-t border-zinc-100 pt-8">
          <div class="space-y-3">
            <h4 class="text-[0.65rem] font-semibold uppercase tracking-widest text-zinc-400">已匹配关键词 / Matched</h4>
            <div class="flex flex-wrap gap-2">${matched || '<span class="text-xs text-zinc-400">无明显匹配项</span>'}</div>
          </div>
          
          <div class="space-y-3">
            <h4 class="text-[0.65rem] font-semibold uppercase tracking-widest text-zinc-400">建议补充技能 / Missing</h4>
            <div class="flex flex-wrap gap-2">${missing || '<span class="text-xs text-zinc-400">无明显缺失项</span>'}</div>
          </div>
        </div>
      `;
      container.classList.remove('hidden');
    }

    function showSection(id) {
      document.getElementById(id).classList.remove('hidden');
    }

    function showLoading(loadingId, errorId, contentId) {
      document.getElementById(loadingId).classList.remove('hidden');
      document.getElementById(errorId).classList.add('hidden');
      document.getElementById(contentId).classList.add('hidden');
    }

    function showError(errorId, msg) {
      const el = document.getElementById(errorId);
      el.textContent = msg;
      el.classList.remove('hidden');
      const loadingId = errorId.replace('Error', 'Loading');
      document.getElementById(loadingId)?.classList.add('hidden');
    }

    function escHtml(str) {
      return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }
  </script>
</body>
</html>
