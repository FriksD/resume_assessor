<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI 简历评估系统</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 min-h-screen font-sans text-slate-900">

  <header class="bg-white border-b border-slate-200 py-5 sticky top-0 z-10">
    <div class="max-w-4xl mx-auto px-6 flex items-baseline justify-between">
      <h1 class="text-xl font-bold tracking-tight text-slate-900">AI 简历评估</h1>
      <p class="text-slate-500 text-sm font-medium">智能提取 · 岗位匹配</p>
    </div>
  </header>

  <main class="max-w-4xl mx-auto px-6 py-10 space-y-10">

    <section class="bg-white rounded-xl shadow-sm border border-slate-200 p-8">
      <div class="mb-6">
        <h2 class="text-lg font-semibold text-slate-800 flex items-center gap-2">
          <span class="bg-slate-100 text-slate-600 px-2.5 py-0.5 rounded-md text-sm">Step 1</span>
          上传并解析简历
        </h2>
      </div>

      <label id="dropZone" class="group block w-full border-2 border-dashed border-slate-300 rounded-lg p-10 text-center cursor-pointer hover:bg-blue-50 hover:border-blue-400 transition-all duration-200 mb-6">
        <div class="flex flex-col items-center justify-center gap-2">
          <svg class="w-8 h-8 text-slate-400 group-hover:text-blue-500 transition-colors" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12"></path>
          </svg>
          <p class="text-slate-700 font-medium" id="dropLabel">点击选择或拖拽 PDF 文件至此</p>
          <p class="text-sm text-slate-400">仅支持 PDF 格式文件</p>
        </div>
        <input id="resumeFile" type="file" accept=".pdf" class="hidden" onchange="onFileSelected(this)" />
      </label>

      <button onclick="analyzeResume()" class="w-full bg-slate-900 hover:bg-slate-800 text-white font-medium py-3 rounded-lg transition-colors shadow-sm">
        解析简历
      </button>

      <div id="parseResult" class="hidden mt-8 pt-6 border-t border-slate-100">
        <div id="parseLoading" class="hidden flex justify-center items-center py-8 text-slate-500 text-sm">
          <svg class="animate-spin -ml-1 mr-3 h-5 w-5 text-slate-500" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>
          AI 正在提取信息，请稍候...
        </div>
        <div id="parseError" class="hidden bg-red-50 text-red-600 border border-red-100 rounded-lg p-4 text-sm"></div>
        <div id="extractedCards" class="hidden grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4"></div>
      </div>
    </section>

    <section class="bg-white rounded-xl shadow-sm border border-slate-200 p-8">
      <div class="mb-6">
        <h2 class="text-lg font-semibold text-slate-800 flex items-center gap-2">
          <span class="bg-slate-100 text-slate-600 px-2.5 py-0.5 rounded-md text-sm">Step 2</span>
          岗位匹配分析
        </h2>
      </div>

      <div class="mb-6">
        <textarea id="jobDescription" rows="5"
                  class="w-full border border-slate-300 rounded-lg p-4 text-sm text-slate-800 focus:outline-none focus:ring-2 focus:ring-blue-500/20 focus:border-blue-500 resize-none transition-colors"
                  placeholder="请在此粘贴目标岗位的 JD (Job Description)..."></textarea>
      </div>

      <button onclick="matchResume()" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-medium py-3 rounded-lg transition-colors shadow-sm">
        开始评估匹配度
      </button>

      <div id="scoreResult" class="hidden mt-8 pt-6 border-t border-slate-100">
        <div id="scoreLoading" class="hidden flex justify-center items-center py-8 text-slate-500 text-sm">
          <svg class="animate-spin -ml-1 mr-3 h-5 w-5 text-slate-500" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>
          正在生成深度评估报告...
        </div>
        <div id="scoreError" class="hidden bg-red-50 text-red-600 border border-red-100 rounded-lg p-4 text-sm"></div>
        <div id="scoreCards" class="hidden space-y-6"></div>
      </div>
    </section>

  </main>

  <script>
    const API_BASE = 'https://resume-assessor-jjvpvorajq.cn-hangzhou.fcapp.run';
    let currentFileHash = null;

    function onFileSelected(input) {
      const label = document.getElementById('dropLabel');
      label.textContent = input.files[0] ? input.files[0].name : '点击选择或拖拽 PDF 文件至此';
      if (input.files[0]) {
        label.classList.add('text-blue-600');
        label.classList.remove('text-slate-700');
      }
    }

    const dropZone = document.getElementById('dropZone');
    // 删除了原本引发 bug 的 click 监听器
    dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('bg-blue-50', 'border-blue-400'); });
    dropZone.addEventListener('dragleave', () => dropZone.classList.remove('bg-blue-50', 'border-blue-400'));
    dropZone.addEventListener('drop', e => {
      e.preventDefault();
      dropZone.classList.remove('bg-blue-50', 'border-blue-400');
      const file = e.dataTransfer.files[0];
      if (file && file.name.toLowerCase().endsWith('.pdf')) {
        const input = document.getElementById('resumeFile');
        const dt = new DataTransfer();
        dt.items.add(file);
        input.files = dt.files;
        onFileSelected(input);
      }
    });

    async function analyzeResume() {
      const input = document.getElementById('resumeFile');
      const file = input.files[0];
      if (!file) { alert('请先选择一个 PDF 文件'); return; }

      showSection('parseResult');
      showLoading('parseLoading', 'parseError', 'extractedCards');

      try {
        const form = new FormData();
        form.append('file', file);
        const res = await fetch(`${API_BASE}/parse`, { method: 'POST', body: form });
        const data = await res.json();

        if (!res.ok) {
          showError('parseError', data.error || '解析失败，请重试');
          return;
        }

        currentFileHash = data.file_hash;
        renderExtracted(data.extracted, data.cache_hit);
        
        // 解析完成后清空加载状态
        document.getElementById('parseLoading').classList.add('hidden');
      } catch (err) {
        showError('parseError', '网络错误：' + err.message);
      }
    }

    function renderExtracted(info, cacheHit) {
      const container = document.getElementById('extractedCards');
      container.innerHTML = '';

      const labels = {
        name: '姓名', phone: '电话', email: '邮箱', address: '地址',
        job_intent: '求职意向', expected_salary: '期望薪资',
        work_years: '工作年限', education: '学历背景',
      };

      for (const [key, label] of Object.entries(labels)) {
        const val = info[key];
        if (!val) continue;
        container.insertAdjacentHTML('beforeend', `
          <div class="bg-slate-50 border border-slate-100 rounded-lg p-4">
            <p class="text-xs text-slate-400 mb-1">${label}</p>
            <p class="text-sm text-slate-800 font-medium">${escHtml(String(val))}</p>
          </div>
        `);
      }

      if (Array.isArray(info.project_experience) && info.project_experience.length > 0) {
        const items = info.project_experience.map(p => `<li class="text-sm text-slate-700 leading-relaxed">${escHtml(p)}</li>`).join('');
        container.insertAdjacentHTML('beforeend', `
          <div class="bg-slate-50 border border-slate-100 rounded-lg p-5 col-span-1 sm:col-span-2 lg:col-span-3">
            <p class="text-xs text-slate-400 mb-3 uppercase tracking-wider">核心项目经历</p>
            <ul class="list-disc list-outside ml-4 space-y-2">${items}</ul>
          </div>
        `);
      }

      if (cacheHit) {
        container.insertAdjacentHTML('beforeend', `
          <p class="text-xs text-slate-400 col-span-1 sm:col-span-2 lg:col-span-3 flex items-center gap-1">
            <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg>
            从系统缓存极速读取
          </p>
        `);
      }

      container.classList.remove('hidden');
    }

    async function matchResume() {
      if (!currentFileHash) { alert('请先完成第一步：解析简历'); return; }
      const jd = document.getElementById('jobDescription').value.trim();
      if (!jd) { alert('请输入岗位描述'); return; }

      showSection('scoreResult');
      showLoading('scoreLoading', 'scoreError', 'scoreCards');

      try {
        const res = await fetch(`${API_BASE}/score`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ file_hash: currentFileHash, job_description: jd }),
        });
        const data = await res.json();

        if (res.status === 404) {
          showError('scoreError', '会话已过期，请重新上传并解析简历');
          currentFileHash = null;
          return;
        }
        if (!res.ok) {
          showError('scoreError', data.error || '评分失败，请重试');
          return;
        }

        renderScore(data);
        document.getElementById('scoreLoading').classList.add('hidden');
      } catch (err) {
        showError('scoreError', '网络错误：' + err.message);
      }
    }

    function renderScore(data) {
      const score = Number(data.score) || 0;
      let theme = { color: 'text-slate-800', border: 'border-slate-800', bg: 'bg-slate-50' };
      
      if (score >= 80) {
        theme = { color: 'text-blue-600', border: 'border-blue-600', bg: 'bg-blue-50' };
      } else if (score >= 60) {
        theme = { color: 'text-amber-500', border: 'border-amber-500', bg: 'bg-amber-50' };
      } else {
        theme = { color: 'text-red-500', border: 'border-red-500', bg: 'bg-red-50' };
      }

      const matched = (data.matched_keywords || []).map(k =>
        `<span class="bg-emerald-50 text-emerald-700 border border-emerald-200 text-xs px-2.5 py-1 rounded-md">${escHtml(k)}</span>`
      ).join('');

      const missing = (data.missing_keywords || []).map(k =>
        `<span class="bg-rose-50 text-rose-700 border border-rose-200 text-xs px-2.5 py-1 rounded-md">${escHtml(k)}</span>`
      ).join('');

      const container = document.getElementById('scoreCards');
      container.innerHTML = `
        <div class="flex flex-col sm:flex-row items-start sm:items-center gap-6 p-6 ${theme.bg} rounded-xl border ${theme.border} border-opacity-20">
          <div class="w-24 h-24 rounded-full border-4 ${theme.border} flex items-center justify-center shrink-0 bg-white">
            <span class="text-4xl font-bold ${theme.color}">${score}</span>
          </div>
          <div class="flex-1">
            <h3 class="text-sm font-semibold text-slate-800 mb-2">综合评估</h3>
            <p class="text-slate-600 text-sm leading-relaxed">${escHtml(data.summary || '暂无总结')}</p>
          </div>
        </div>

        <div class="grid grid-cols-1 sm:grid-cols-2 gap-6 mt-6">
          <div class="space-y-3">
            <h4 class="text-sm font-medium text-slate-700 flex items-center gap-2">
              <svg class="w-4 h-4 text-emerald-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg>
              已匹配关键词
            </h4>
            <div class="flex flex-wrap gap-2">${matched || '<span class="text-xs text-slate-400">无明显匹配项</span>'}</div>
          </div>
          
          <div class="space-y-3">
            <h4 class="text-sm font-medium text-slate-700 flex items-center gap-2">
              <svg class="w-4 h-4 text-rose-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
              建议补充关键词
            </h4>
            <div class="flex flex-wrap gap-2">${missing || '<span class="text-xs text-slate-400">无明显缺失项</span>'}</div>
          </div>
        </div>
      `;
      container.classList.remove('hidden');
    }

    function showSection(id) {
      document.getElementById(id).classList.remove('hidden');
    }

    function showLoading(loadingId, errorId, contentId) {
      document.getElementById(loadingId).classList.remove('hidden');
      document.getElementById(errorId).classList.add('hidden');
      document.getElementById(contentId).classList.add('hidden');
    }

    function showError(errorId, msg) {
      const el = document.getElementById(errorId);
      el.textContent = msg;
      el.classList.remove('hidden');

      const loadingId = errorId.replace('Error', 'Loading');
      document.getElementById(loadingId)?.classList.add('hidden');
    }

    function escHtml(str) {
      return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }
  </script>
</body>
</html>
